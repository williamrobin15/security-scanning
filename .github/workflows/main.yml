name: Professional DevSecOps Pipeline

on:
  push:
    branches: [ "main", "devsecops-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Job for Secret Scanning (Parallel to SCA)
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --redact

  # 2. Job for SCA (Parallel to Gitleaks)
  trivy_fs:
    name: Software Composition Analysis (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # 3. Job for Build & Containerization (Wait for Security)
  build_and_docker:
    name: Build & Dockerize
    needs: [gitleaks, trivy_fs] # Tabhi chalega jab dono security jobs pass honge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      # Create Docker Image
      - name: Build Docker Image
        run: docker build -t angular-web-app:${{ github.sha }} .

      # 4. Container Scan (Last Security Gate)
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'angular-web-app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
